name: kiro-ai-quality-gate
description: Kiro - callable AI antipattern quality gate for one completed implementation task
subworkflow:
  callable: true
  visibility: internal
  returns:
    - need_replan
  params:
    fix_instruction:
      type: facet_ref
      facet_kind: instruction
      default: kiro-ai-antipattern-fix-implementation
    domain_knowledge:
      type: facet_ref[]
      facet_kind: knowledge
      default:
        - backend
        - architecture
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 12
initial_step: ai-antipattern-review-1st

instructions:
  kiro-ai-antipattern-fix-implementation: ../facets/instructions/kiro-ai-antipattern-fix-implementation.md

policies:
  kiro-artifact-operations: ../facets/policies/kiro-artifact-operations.md
  kiro-impl-task-progress: ../facets/policies/kiro-impl-task-progress.md

report_formats:
  kiro-ai-antipattern-fix-result: ../facets/output-contracts/kiro-ai-antipattern-fix-result.md

loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (findings are shrinking or the latest fix has concrete finding_decisions)
          next: ai-antipattern-review-1st
        - condition: Unproductive (loop_monitors.threshold reached for ai-antipattern-review-1st and ai-antipattern-fix)
          next: ABORT

steps:
  - name: ai-antipattern-review-1st
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
      - kiro-artifact-operations
      - kiro-impl-task-progress
    knowledge:
      $param: domain_knowledge
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    required_permission_mode: readonly
    instruction: ai-antipattern-review
    output_contracts:
      report:
        - name: kiro-ai-antipattern-review.md
          format: ai-antipattern-review
    rules:
      - condition: VERDICT APPROVED and no persistent AI antipattern findings remain
        next: COMPLETE
      - condition: VERDICT REJECTED and actionable AI antipattern findings exist for the selected task
        next: ai-antipattern-fix

  - name: ai-antipattern-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - ai-antipattern
      - kiro-artifact-operations
      - kiro-impl-task-progress
    session: refresh
    knowledge:
      $param: domain_knowledge
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    pass_previous_response: false
    instruction:
      $param: fix_instruction
    output_contracts:
      report:
        - name: kiro-ai-antipattern-fix.md
          format: kiro-ai-antipattern-fix-result
    rules:
      - condition: STATUS FIXED
        next: ai-antipattern-review-1st
      - condition: STATUS NO_FIX_NEEDED and finding-level evidence supports every finding_decision
        next: COMPLETE
      - condition: STATUS NEED_REPLAN
        return: need_replan
      - condition: STATUS BLOCKED
        next: ABORT
