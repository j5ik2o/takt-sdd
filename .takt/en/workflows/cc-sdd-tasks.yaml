name: cc-sdd-tasks
description: SDD Phase 3 - Generates implementation task list based on requirements and design
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: generate-tasks

policies:
  cc-sdd-tasks: ../facets/policies/cc-sdd-tasks.md

instructions:
  generate-tasks: ../facets/instructions/cc-sdd-generate-tasks.md

report_formats:
  cc-sdd-tasks: ../facets/output-contracts/cc-sdd-tasks.md

steps:
  - name: generate-tasks
    edit: true
    persona: planner
    policy: cc-sdd-tasks
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
    required_permission_mode: edit
    instruction: generate-tasks
    output_contracts:
      report:
        - name: tasks.md
          format: cc-sdd-tasks
    rules:
      - condition: Task decomposition complete, all requirements covered
        next: COMPLETE
      - condition: Requirements or design not found
        next: ABORT
