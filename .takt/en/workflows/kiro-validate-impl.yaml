name: kiro-validate-impl
description: Kiro - Read-only implementation completion validation
# Checks tasks.md and spec.json.ready_for_implementation without executing implementation tasks.
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 5
initial_step: collect-impl-evidence

instructions:
  kiro-validate-impl-readiness: ../facets/instructions/kiro-validate-impl-readiness.md

report_formats:
  kiro-validation-result: ../facets/output-contracts/kiro-validation-result.md

steps:
  - name: collect-impl-evidence
    edit: false
    persona: supervisor
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-impl-readiness
    rules:
      - condition: validation evidence collected
        next: validate-impl
      - condition: required artifact missing or unreadable
        next: ABORT

  - name: validate-impl
    edit: false
    persona: supervisor
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-impl-readiness
    output_contracts:
      report:
        - name: kiro-impl-validation-draft.md
          format: kiro-validation-result
    rules:
      - condition: DECISION MANUAL_VERIFY_REQUIRED
        next: report-impl
      - condition: DECISION GO
        next: report-impl
      - condition: DECISION NO-GO
        next: report-impl

  - name: report-impl
    edit: false
    persona: supervisor
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-impl-readiness
    output_contracts:
      report:
        - name: kiro-impl-validation-result.md
          format: kiro-validation-result
    rules:
      - condition: DECISION MANUAL_VERIFY_REQUIRED
        next: ABORT
      - condition: DECISION GO
        next: COMPLETE
      - condition: DECISION NO-GO
        next: ABORT
