name: opsx-archive
description: OpenSpec Archive - Archive a completed change
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: archive

personas:
  opsx-archiver: ../facets/personas/opsx-archiver.md

instructions:
  archive: ../facets/instructions/opsx-archive.md

report_formats:
  opsx-archive-summary: ../facets/output-contracts/opsx-archive-summary.md

steps:
  - name: archive
    edit: true
    persona: opsx-archiver
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
    required_permission_mode: edit
    instruction: archive
    output_contracts:
      report:
        - name: archive-summary.md
          format: opsx-archive-summary
    rules:
      - condition: Archive completed successfully
        next: COMPLETE
      - condition: Failed to archive
        next: ABORT
        appendix: |
          Reason:
          - {failure_reason}
