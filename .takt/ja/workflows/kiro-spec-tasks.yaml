name: kiro-spec-tasks
description: Kiro - approved requirements と design から implementation-ready な tasks.md を生成する
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 14
initial_step: generate-tasks

instructions:
  kiro-spec-tasks: ../facets/instructions/kiro-spec-tasks.md
  kiro-spec-tasks-review: ../facets/instructions/kiro-spec-tasks-review.md

policies:
  kiro-artifact-operations: ../facets/policies/kiro-artifact-operations.md
  kiro-spec-lifecycle: ../facets/policies/kiro-spec-lifecycle.md
  kiro-spec-generation: ../facets/policies/kiro-spec-generation.md
  kiro-spec-task-annotations: ../facets/policies/kiro-spec-task-annotations.md

report_formats:
  kiro-spec-generation-result: ../facets/output-contracts/kiro-spec-generation-result.md
  kiro-spec-tasks-review-result: ../facets/output-contracts/kiro-spec-tasks-review-result.md

loop_monitors:
  - cycle:
      - ai-quality-gate-tasks
      - review-tasks
      - repair-tasks
      - finalize-tasks
    threshold: 2
    judge:
      persona: supervisor
      instruction: kiro-spec-tasks
      rules:
        - condition: Healthy (review findings are converging)
          next: ai-quality-gate-tasks
        - condition: Unproductive (same finding repeats or no improvement)
          next: ABORT

steps:
  - name: generate-tasks
    edit: true
    persona: planner
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
      - kiro-spec-task-annotations
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
    required_permission_mode: edit
    instruction: kiro-spec-tasks
    output_contracts:
      report:
        - name: kiro-spec-tasks-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and phase tasks and draft_status READY_FOR_REVIEW and review_gate PENDING
        next: ai-quality-gate-tasks
      - condition: validation.verdict BLOCKED or requirements/design approval gate failed or hidden prerequisite remains or boundary overlap remains or coverage gap remains
        next: ABORT
      - condition: validation.verdict NEEDS_FIX and draft_status READY_FOR_REVIEW and review_gate PENDING
        next: ai-quality-gate-tasks

  - name: ai-quality-gate-tasks
    kind: workflow_call
    call: ./kiro-spec-ai-quality-gate.yaml
    args:
      fix_instruction: kiro-ai-antipattern-fix-spec-generation
      domain_knowledge:
        - architecture
    rules:
      - condition: COMPLETE
        next: review-tasks
      - condition: need_replan
        next: ABORT
      - condition: ABORT
        next: ABORT

  - name: review-tasks
    edit: false
    persona: reviewer
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
      - kiro-spec-task-annotations
    knowledge:
      - architecture
    required_permission_mode: readonly
    instruction: kiro-spec-tasks-review
    output_contracts:
      report:
        - name: kiro-spec-tasks-review.md
          format: kiro-spec-tasks-review-result
    rules:
      - condition: task_plan_review PASS and task_graph_sanity_review PASS
        next: finalize-tasks
      - condition: task_plan_review NEEDS_FIXES and fatal_review_issue AI_GATE_SCOPE_MISMATCH
        next: ABORT
      - condition: task_plan_review NEEDS_FIXES and fatal_review_issue REVIEW_TARGET_SCOPE_MISMATCH
        next: ABORT
      - condition: task_plan_review NEEDS_FIXES and fatal_review_issue MISSING_DRAFT_ARTIFACT
        next: ABORT
      - condition: task_plan_review NEEDS_FIXES or task_graph_sanity_review NEEDS_FIXES
        next: repair-tasks
      - condition: task_plan_review RETURN_TO_DESIGN or task_graph_sanity_review RETURN_TO_DESIGN
        next: ABORT
      - condition: hidden prerequisite remains or boundary overlap remains or coverage gap remains
        next: ABORT

  - name: repair-tasks
    edit: true
    persona: planner
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
      - kiro-spec-task-annotations
    knowledge:
      - architecture
    required_permission_mode: edit
    instruction: kiro-spec-tasks
    output_contracts:
      report:
        - name: kiro-spec-tasks-repair-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and phase tasks and draft_status READY_FOR_REVIEW and review_gate PENDING
        next: ai-quality-gate-tasks
      - condition: validation.verdict NEEDS_FIX and draft_status READY_FOR_REVIEW and review_gate PENDING and local repair attempted
        next: ai-quality-gate-tasks
      - condition: validation.verdict BLOCKED or requirements/design approval gate failed or hidden prerequisite remains or boundary overlap remains or coverage gap remains
        next: ABORT

  - name: finalize-tasks
    edit: true
    persona: planner
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
      - kiro-spec-task-annotations
    knowledge:
      - architecture
    required_permission_mode: edit
    instruction: kiro-spec-tasks
    output_contracts:
      report:
        - name: kiro-spec-tasks-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and auto-approve and phase tasks and draft_status WRITTEN and review_gate PASSED and tasks.md written and tasks-generated and approvals.requirements.approved true and approvals.design.approved true and approvals.tasks.generated true and approvals.tasks.approved true and ready_for_implementation true
        next: COMPLETE
      - condition: validation.verdict PASS and not auto-approve and phase tasks and draft_status WRITTEN and review_gate PASSED and tasks.md written and tasks-generated and approvals.requirements.approved true and approvals.design.approved true and approvals.tasks.generated true
        next: COMPLETE
      - condition: validation.verdict NEEDS_FIX
        next: repair-tasks
      - condition: validation.verdict BLOCKED or requirements/design approval gate failed or hidden prerequisite remains or boundary overlap remains or coverage gap remains
        next: ABORT

# validation/review 用の contract notes:
# - requirements/design approval gate は task generation 前に requirements.md、design.md、spec.json を確認する。
# - 通常 mode では未承認 requirements または design で停止する。-y または auto-approve の場合は、続行前に approvals.requirements.approved: true と approvals.design.approved: true を明示的に設定する。
# - task generation は requirements.md、design.md、existing tasks.md、spec.json、.kiro/settings/templates/specs/tasks.md を読む。
# - tasks の AI gate と review は `draft_artifacts.tasks` の tasks_draft だけを対象にする。unscoped git diff、current dirty worktree、unrelated workflow/facet/script/test changes へフォールバックしない。
# - tasks で AI gate evidence が別 phase、unscoped git diff、current dirty worktree、unrelated workflow/facet/script/test changes を対象にした場合は ai_gate_scope_mismatch として ABORT し、repair-tasks に流さない。
# - tasks.md のすべての executable task は observable completion detail、numeric requirements、_Boundary:_、_Depends:_ を含める。
# - dependency がない task は _Depends:_ none を使う。
# - success metadata の前に task plan review と task graph sanity review を実行する。
# - (P) は non-overlapping boundary と explicit dependency graph から独立実行可能と判断できる場合だけ使う。
# - workflow は generate/repair -> ai-quality-gate-tasks -> review -> finalize を使い、finalize からの repair 戻りも監視対象に含め、repeat bound は loop_monitors.threshold だけに置く。
# - 成功時は spec.json を phase: "tasks-generated" と approvals.tasks.generated: true に更新する。
# - auto-approve mode では approvals.tasks.approved: true と ready_for_implementation: true も設定する。
# - 通常 mode では tasks approval が存在するまで ready_for_implementation true にしない。
