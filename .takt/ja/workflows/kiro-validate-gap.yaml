name: kiro-validate-gap
description: Kiro - design 前 gap validation を読み取り専用で行う
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 5
initial_step: collect-gap-evidence

instructions:
  kiro-validate-gap-readiness: ../facets/instructions/kiro-validate-gap-readiness.md

report_formats:
  kiro-validation-result: ../facets/output-contracts/kiro-validation-result.md

steps:
  - name: collect-gap-evidence
    edit: false
    persona: qa-reviewer
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-gap-readiness
    rules:
      - condition: validation evidence collected
        next: validate-gap
      - condition: required artifact missing or unreadable
        next: ABORT

  - name: validate-gap
    edit: false
    persona: qa-reviewer
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-gap-readiness
    output_contracts:
      report:
        - name: kiro-gap-validation-draft.md
          format: kiro-validation-result
    rules:
      - condition: DECISION MANUAL_VERIFY_REQUIRED
        next: report-gap
      - condition: DECISION GO
        next: report-gap
      - condition: DECISION NO-GO
        next: report-gap

  - name: report-gap
    edit: false
    persona: qa-reviewer
    policy:
      - review
      - qa
    required_permission_mode: readonly
    instruction: kiro-validate-gap-readiness
    output_contracts:
      report:
        - name: kiro-gap-validation-result.md
          format: kiro-validation-result
    rules:
      - condition: DECISION MANUAL_VERIFY_REQUIRED
        next: ABORT
      - condition: DECISION GO
        next: COMPLETE
      - condition: DECISION NO-GO
        next: ABORT
