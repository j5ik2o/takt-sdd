name: kiro-impl
description: Kiro - approved spec から eligible な task を 1 つずつ実装し、全 task 完了まで review、debug、verify、progress update を反復する
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 200
initial_step: plan-one-task

instructions:
  kiro-impl-plan-one-task: ../facets/instructions/kiro-impl-plan-one-task.md
  kiro-impl-execute-task: ../facets/instructions/kiro-impl-execute-task.md
  kiro-impl-update-progress: ../facets/instructions/kiro-impl-update-progress.md
  kiro-review-task: ../facets/instructions/kiro-review-task.md
  kiro-review-architecture-task: ../facets/instructions/kiro-review-architecture-task.md
  kiro-review-qa-task: ../facets/instructions/kiro-review-qa-task.md
  kiro-review-testing-task: ../facets/instructions/kiro-review-testing-task.md
  kiro-debug-task: ../facets/instructions/kiro-debug-task.md
  kiro-verify-task-completion: ../facets/instructions/kiro-verify-task-completion.md
  kiro-validate-impl-final: ../facets/instructions/kiro-validate-impl-final.md

policies:
  kiro-artifact-operations: ../facets/policies/kiro-artifact-operations.md
  kiro-spec-lifecycle: ../facets/policies/kiro-spec-lifecycle.md
  kiro-spec-task-annotations: ../facets/policies/kiro-spec-task-annotations.md
  kiro-impl-task-progress: ../facets/policies/kiro-impl-task-progress.md

report_formats:
  kiro-implementation-result: ../facets/output-contracts/kiro-implementation-result.md
  kiro-review-verdict: ../facets/output-contracts/kiro-review-verdict.md
  kiro-debug-decision: ../facets/output-contracts/kiro-debug-decision.md
  kiro-completion-verification: ../facets/output-contracts/kiro-completion-verification.md
  kiro-ai-antipattern-fix-result: ../facets/output-contracts/kiro-ai-antipattern-fix-result.md
  kiro-validation-result: ../facets/output-contracts/kiro-validation-result.md

loop_monitors:
  - cycle:
      - execute-task
      - debug-task
    threshold: 2
    judge:
      persona: supervisor
      instruction: kiro-debug-task
      rules:
        - condition: Healthy (NEXT_ACTION RETRY_TASK has a concrete FIX_PLAN and selected task scope is unchanged)
          next: execute-task
        - condition: Unproductive (loop_monitors.threshold reached for execute-task and debug-task)
          next: update-progress

  - cycle:
      - execute-task
      - ai-quality-gate
      - reviewers
      - debug-task
    threshold: 2
    judge:
      persona: supervisor
      instruction: kiro-debug-task
      rules:
        - condition: Healthy (reviewer child conditions are converging toward all("approved") and needs_fix findings are shrinking)
          next: execute-task
        - condition: Unproductive (loop_monitors.threshold reached for execute-task, ai-quality-gate, reviewers, and debug-task)
          next: update-progress

steps:
  - name: plan-one-task
    edit: false
    persona: planner
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-task-annotations
      - kiro-impl-task-progress
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    required_permission_mode: readonly
    pass_previous_response: false
    instruction: kiro-impl-plan-one-task
    output_contracts:
      report:
        - name: kiro-implementation-plan.md
          format: kiro-implementation-result
    rules:
      - condition: STATUS READY_FOR_REVIEW and ready_for_implementation true and exactly one selected task and implementation plan emitted
        next: execute-task
      - condition: STATUS BLOCKED and selected task exists and blocker_note_required true
        next: update-progress
      - condition: STATUS BLOCKED and no selected task or readiness gate failed
        next: ABORT
      - condition: STATUS NEEDS_CONTEXT
        next: ABORT

  - name: execute-task
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - kiro-artifact-operations
      - kiro-impl-task-progress
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    instruction: kiro-impl-execute-task
    output_contracts:
      report:
        - name: kiro-task-implementation-result.md
          format: kiro-implementation-result
    rules:
      - condition: STATUS READY_FOR_REVIEW
        next: ai-quality-gate
      - condition: STATUS BLOCKED
        next: debug-task
      - condition: STATUS NEEDS_CONTEXT
        next: debug-task

  - name: ai-quality-gate
    kind: workflow_call
    call: ./kiro-ai-quality-gate.yaml
    args:
      fix_instruction: kiro-ai-antipattern-fix-implementation
      domain_knowledge:
        - architecture
    rules:
      - condition: COMPLETE
        next: reviewers
      - condition: need_replan
        next: debug-task
      - condition: ABORT
        next: ABORT

  - name: reviewers
    parallel:
      - name: coding-review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - qa
          - kiro-artifact-operations
          - kiro-impl-task-progress
        knowledge:
          - architecture
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
        required_permission_mode: readonly
        instruction: kiro-review-task
        output_contracts:
          report:
            - name: kiro-task-coding-review.md
              format: kiro-review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy:
          - review
          - kiro-artifact-operations
          - kiro-impl-task-progress
        knowledge:
          - architecture
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
        required_permission_mode: readonly
        instruction: kiro-review-architecture-task
        output_contracts:
          report:
            - name: kiro-task-architecture-review.md
              format: kiro-review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
          - kiro-artifact-operations
          - kiro-impl-task-progress
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
        required_permission_mode: readonly
        instruction: kiro-review-qa-task
        output_contracts:
          report:
            - name: kiro-task-qa-review.md
              format: kiro-review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: testing-review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
          - kiro-artifact-operations
          - kiro-impl-task-progress
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
        required_permission_mode: readonly
        instruction: kiro-review-testing-task
        output_contracts:
          report:
            - name: kiro-task-testing-review.md
              format: kiro-review-verdict
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: verify-task-completion
      - condition: any("needs_fix")
        next: debug-task

  - name: debug-task
    edit: false
    persona: supervisor
    policy:
      - review
      - kiro-artifact-operations
      - kiro-impl-task-progress
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: readonly
    pass_previous_response: false
    instruction: kiro-debug-task
    output_contracts:
      report:
        - name: kiro-task-debug-decision.md
          format: kiro-debug-decision
    rules:
      - condition: NEXT_ACTION RETRY_TASK and retry_eligible true
        next: execute-task
      - condition: NEXT_ACTION RETRY_TASK and retry_eligible false
        next: update-progress
      - condition: NEXT_ACTION BLOCK_TASK
        next: update-progress
      - condition: NEXT_ACTION STOP_FOR_HUMAN
        next: update-progress

  - name: verify-task-completion
    edit: false
    persona: supervisor
    policy:
      - review
      - qa
      - kiro-artifact-operations
      - kiro-impl-task-progress
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    required_permission_mode: readonly
    pass_previous_response: false
    instruction: kiro-verify-task-completion
    output_contracts:
      report:
        - name: kiro-task-completion-verification.md
          format: kiro-completion-verification
    rules:
      - condition: STATUS VERIFIED and safe_to_update_progress true
        next: update-progress
      - condition: STATUS NOT_VERIFIED
        next: debug-task
      - condition: STATUS MANUAL_VERIFY_REQUIRED
        next: debug-task

  - name: update-progress
    edit: true
    persona: coder
    policy:
      - kiro-artifact-operations
      - kiro-impl-task-progress
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    pass_previous_response: false
    instruction: kiro-impl-update-progress
    output_contracts:
      report:
        - name: kiro-task-progress-update.md
          format: kiro-implementation-result
    rules:
      - condition: STATUS READY_FOR_REVIEW and selected task checkbox updated and task_set_status ALL_TASKS_COMPLETE
        next: validate-impl-final
      - condition: STATUS READY_FOR_REVIEW and selected task checkbox updated and task_set_status REMAINING_TASKS_EXIST
        next: plan-one-task
      - condition: STATUS BLOCKED and selected task blocker note written
        next: ABORT
      - condition: STATUS BLOCKED and progress update could not be written safely
        next: ABORT
      - condition: STATUS NEEDS_CONTEXT
        next: ABORT

  - name: validate-impl-final
    edit: false
    persona: supervisor
    policy:
      - review
      - qa
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-impl-task-progress
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    required_permission_mode: readonly
    pass_previous_response: false
    instruction: kiro-validate-impl-final
    output_contracts:
      report:
        - name: kiro-final-implementation-validation.md
          format: kiro-validation-result
    rules:
      - condition: DECISION GO
        next: COMPLETE
      - condition: DECISION NO-GO
        next: ABORT
      - condition: DECISION MANUAL_VERIFY_REQUIRED
        next: ABORT

# Contract notes:
# - この workflow は selected task を 1 つずつ扱い、REMAINING_TASKS_EXIST の間は plan-one-task に戻って次の task を選ぶ。
# - kiro-review、kiro-debug、kiro-verify-completion、kiro-validate-impl は standalone workflow ではなく、この workflow 内の adapter step として接続する。
# - review は parallel reviewer group で実行し、child condition の approved / needs_fix を親 rule で集約する。
# - workflow rule は primary machine field の STATUS、VERDICT、NEXT_ACTION、DECISION と reviewer child condition で分岐する。
# - 再実行上限は loop_monitors.threshold だけで表現する。
