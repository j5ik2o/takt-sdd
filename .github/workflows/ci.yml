name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  installer:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [en, ja]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build installer
        working-directory: installer
        run: npm ci --ignore-scripts && npm run build

      - name: Dry-run (${{ matrix.lang }})
        run: node installer/dist/cli.js --dry-run --lang ${{ matrix.lang }}

  global-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build installer
        run: npm run build:installer

      - name: CLI unit/integration tests
        run: |
          node --test tests/takt-sdd-cli.test.mjs
          node --test tests/takt-sdd-init-policy.test.mjs
          node --test tests/takt-sdd-package-artifact.test.mjs

      - name: Validate package artifact
        run: npm run validate:package-artifact

      - name: Global install smoke
        run: node --test tests/takt-sdd-global-install-smoke.test.mjs

  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install takt
        # Pin to the takt version declared in package.json. Floating "latest" (0.46.0)
        # dropped builtin facets (e.g. review-requirements) that spec workflows extend,
        # which broke the `takt prompt` lint below. Tracking the pinned version keeps
        # the global CLI aligned with node_modules and renovate bumps.
        run: |
          TAKT_VERSION="$(node -p "(()=>{const p=require('./package.json');return (p.dependencies&&p.dependencies.takt)||(p.devDependencies&&p.devDependencies.takt)||''})()")"
          test -n "$TAKT_VERSION" || { echo "::error::could not resolve takt version from package.json"; exit 1; }
          npm install -g "takt@${TAKT_VERSION}"

      - name: Validate workflows (en)
        run: |
          failed=0
          for workflow in .takt/en/workflows/*.yaml; do
            echo "::group::$(basename "$workflow")"
            output=$(takt prompt "$workflow" 2>&1) && { echo "$output"; } || {
              if echo "$output" | grep -qE "reportContent is required|Persona prompt file path is not allowed"; then
                echo "$output"
                echo "::notice::Validation skipped (expected limitation)"
              else
                echo "$output"
                echo "::error::Validation failed: $workflow"
                failed=1
              fi
            }
            echo "::endgroup::"
          done
          exit $failed

      - name: Validate Kiro AI quality gate coverage
        run: |
          npm run validate:kiro-workflow-surface
          npm run test:kiro-workflow-surface
          npm run validate:kiro-discovery-batch-workflows
          npm run test:kiro-discovery-batch-workflows
          npm run validate:kiro-ai-quality-gate-workflow-coverage
          npm run test:kiro-ai-quality-gate-workflow-coverage
          npm run validate:kiro-shared-contracts
          npm run test:kiro-shared-contracts
          npm run validate:kiro-spec-generation-workflows
          npm run test:kiro-spec-generation-workflows
          npm run validate:kiro-status-validation-workflows
          npm run test:kiro-status-validation-workflows
          npm run validate:kiro-iterative-implementation-workflow
          npm run test:kiro-iterative-implementation-workflow
          npm run test:kiro-ai-quality-gate-runtime-smoke
          npm run test:kiro-discovery-ai-quality-gate-runtime-smoke
          npm run test:kiro-real-provider-smoke

      - name: Validate workflows (ja)
        run: |
          failed=0
          for workflow in .takt/ja/workflows/*.yaml; do
            echo "::group::$(basename "$workflow")"
            output=$(takt prompt "$workflow" 2>&1) && { echo "$output"; } || {
              if echo "$output" | grep -qE "reportContent is required|Persona prompt file path is not allowed"; then
                echo "$output"
                echo "::notice::Validation skipped (expected limitation)"
              else
                echo "$output"
                echo "::error::Validation failed: $workflow"
                failed=1
              fi
            }
            echo "::endgroup::"
          done
          exit $failed
