name: kiro-spec-requirements
description: Kiro - brief、steering context、draft requirements から EARS requirements を生成する
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 14
initial_step: generate-requirements

instructions:
  kiro-spec-requirements: ../facets/instructions/kiro-spec-requirements.md
  kiro-spec-requirements-review: ../facets/instructions/kiro-spec-requirements-review.md

policies:
  kiro-artifact-operations: ../facets/policies/kiro-artifact-operations.md
  kiro-spec-lifecycle: ../facets/policies/kiro-spec-lifecycle.md
  kiro-spec-generation: ../facets/policies/kiro-spec-generation.md

report_formats:
  kiro-spec-generation-result: ../facets/output-contracts/kiro-spec-generation-result.md

loop_monitors:
  - cycle:
      - ai-quality-gate-requirements
      - review-requirements
      - repair-requirements
      - finalize-requirements
    threshold: 2
    judge:
      persona: supervisor
      instruction: kiro-spec-requirements
      rules:
        - condition: Healthy (review findings are converging)
          next: ai-quality-gate-requirements
        - condition: Unproductive (same finding repeats or no improvement)
          next: ABORT

steps:
  - name: generate-requirements
    edit: true
    persona: supervisor
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
    required_permission_mode: edit
    instruction: kiro-spec-requirements
    output_contracts:
      report:
        - name: kiro-spec-requirements-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and phase requirements and draft_status READY_FOR_REVIEW and review_gate PENDING
        next: ai-quality-gate-requirements
      - condition: validation.verdict BLOCKED or scope ambiguity remains or acceptance criteria not verifiable
        next: ABORT
      - condition: validation.verdict NEEDS_FIX and draft_status READY_FOR_REVIEW
        next: ai-quality-gate-requirements

  - name: ai-quality-gate-requirements
    kind: workflow_call
    call: ./kiro-spec-ai-quality-gate.yaml
    args:
      fix_instruction: kiro-ai-antipattern-fix-spec-generation
      domain_knowledge:
        - architecture
    rules:
      - condition: COMPLETE
        next: review-requirements
      - condition: need_replan
        next: ABORT
      - condition: ABORT
        next: ABORT

  - name: review-requirements
    edit: false
    persona: reviewer
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
    required_permission_mode: readonly
    instruction: kiro-spec-requirements-review
    output_contracts:
      report:
        - name: kiro-spec-requirements-review.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and requirements review gate passed
        next: finalize-requirements
      - condition: validation.verdict NEEDS_FIX and local repair possible
        next: repair-requirements
      - condition: validation.verdict BLOCKED or scope ambiguity remains
        next: ABORT

  - name: repair-requirements
    edit: true
    persona: supervisor
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
    required_permission_mode: edit
    instruction: kiro-spec-requirements
    output_contracts:
      report:
        - name: kiro-spec-requirements-repair-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and draft_status READY_FOR_REVIEW
        next: ai-quality-gate-requirements
      - condition: validation.verdict NEEDS_FIX and local repair attempted
        next: ai-quality-gate-requirements
      - condition: validation.verdict BLOCKED or scope ambiguity remains or acceptance criteria not verifiable
        next: ABORT

  - name: finalize-requirements
    edit: true
    persona: supervisor
    policy:
      - kiro-artifact-operations
      - kiro-spec-lifecycle
      - kiro-spec-generation
    required_permission_mode: edit
    instruction: kiro-spec-requirements
    output_contracts:
      report:
        - name: kiro-spec-requirements-result.md
          format: kiro-spec-generation-result
    rules:
      - condition: validation.verdict PASS and phase requirements and requirements.md written and requirements-generated and approvals.requirements.generated true
        next: COMPLETE
      - condition: validation.verdict BLOCKED or scope ambiguity remains or acceptance criteria not verifiable
        next: ABORT
      - condition: validation.verdict NEEDS_FIX
        next: repair-requirements

# validation/review 用の contract notes:
# - Context loading は .kiro/specs/<feature>/brief.md、existing draft requirements.md、既存 spec.json、steering context、requirements rules を読む。
# - requirements.md は EARS fixed phrase と numeric IDs のみで生成する。
# - requirements review gate は metadata update 前に EARS 準拠、numeric IDs、検証可能な acceptance criteria、scope ambiguity を確認する。
# - workflow は generate/repair -> ai-quality-gate-requirements -> review -> finalize を使い、finalize からの repair 戻りも監視対象に含め、repeat bound は loop_monitors.threshold だけに置く。
# - 成功時は spec.json を phase: "requirements-generated" と approvals.requirements.generated: true に更新する。
# - scope ambiguity または検証不能な acceptance criteria が残る場合は BLOCKED または NEEDS_FIX を返し、requirements-generated へ進めない。
# - requirements phase では design component ownership、workflow YAML ownership、implementation file ownership を決めない。
